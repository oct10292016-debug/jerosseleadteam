<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="婕樂纖">
<meta name="theme-color" content="#8B6F5E">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>婕樂纖 利潤計算機</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;background:#FAF6F1;color:#2C2420;display:flex;flex-direction:column}
:root{
  --mt-card:#FFFFFF;--mt-border:#E8DDD4;--mt-border2:#D4C4B8;
  --mt-text:#2C2420;--mt-muted:#8C7B72;--mt-hint:#B8A89E;
  --mt-surface:#F2EBE4;--mt-surface2:#EDE4DA;--mt-accent:#8B6F5E;
  --mt-green:#4A7C59;--mt-red:#A0453A;--mt-blue:#5E7EA0;
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
}
.app-header{background:#FAF6F1;padding:calc(12px + var(--safe-top)) 16px 12px;border-bottom:0.5px solid var(--mt-border);flex-shrink:0}
.app-title{font-size:17px;font-weight:600;letter-spacing:-0.3px;color:var(--mt-text)}
.app-subtitle{font-size:12px;color:var(--mt-muted);margin-top:1px}
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 16px calc(16px + var(--safe-bottom))}
.bottom-nav{display:flex;background:var(--mt-card);border-top:0.5px solid var(--mt-border);padding-bottom:var(--safe-bottom);flex-shrink:0}
.nav-btn{flex:1;padding:12px 8px 10px;display:flex;flex-direction:column;align-items:center;gap:4px;border:none;background:none;cursor:pointer;color:var(--mt-hint);font-size:10px;font-weight:500;letter-spacing:0.3px}
.nav-btn.active{color:var(--mt-accent)}
.nav-icon svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.page{display:none}.page.active{display:block}
.toolbar{display:flex;align-items:center;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.level-select{padding:7px 10px;border:0.5px solid var(--mt-border2);border-radius:20px;background:var(--mt-card);color:var(--mt-text);font-size:13px;font-weight:500;outline:none;flex:1;min-width:0}
.btn-group{display:flex;gap:6px;flex-shrink:0}
.add-btn{padding:7px 11px;background:var(--mt-accent);color:#FAF6F1;border:none;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap}
.outline-btn{padding:7px 11px;background:var(--mt-surface2);color:var(--mt-accent);border:0.5px solid var(--mt-border2);border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap}
.items-wrap{display:flex;flex-direction:column;gap:10px;margin-bottom:14px}
.empty-state{text-align:center;padding:2.5rem 1rem;color:var(--mt-hint);font-size:14px;background:var(--mt-surface);border-radius:16px;line-height:1.8}
.card{background:var(--mt-card);border:0.5px solid var(--mt-border);border-radius:16px;overflow:hidden}
.card.custom-card{border-color:var(--mt-border2)}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:11px 14px 0}
.series-tag{font-size:11px;font-weight:500;padding:3px 9px;border-radius:10px;background:var(--mt-surface2);color:var(--mt-accent)}
.custom-tag{background:#F0E8E0;color:#7A5C48}
.rm-btn{width:22px;height:22px;border-radius:50%;border:none;background:var(--mt-surface);color:var(--mt-muted);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rm-btn:active{background:#F5E0DC;color:var(--mt-red)}
.card-body{padding:8px 14px 12px;display:flex;flex-direction:column;gap:8px}
.prod-select{width:100%;padding:7px 10px;border:0.5px solid var(--mt-border);border-radius:10px;background:var(--mt-surface);color:var(--mt-text);font-size:13px;font-weight:500;outline:none}
.controls{display:grid;grid-template-columns:minmax(0,2fr) minmax(0,1fr);gap:8px}
.custom-row{display:grid;grid-template-columns:minmax(0,2fr) minmax(0,1fr) minmax(0,1fr) minmax(0,1fr);gap:6px}
.ctrl-group{display:flex;flex-direction:column;gap:3px}
.ctrl-label{font-size:11px;color:var(--mt-muted);letter-spacing:0.2px;padding-left:2px}
.ctrl-select,.ctrl-input,.custom-name-input{padding:7px 10px;border:0.5px solid var(--mt-border);border-radius:10px;background:var(--mt-surface);color:var(--mt-text);font-size:13px;outline:none;width:100%}
.qty-ctrl{display:flex;align-items:center;border:0.5px solid var(--mt-border);border-radius:10px;background:var(--mt-surface);overflow:hidden;height:36px}
.qty-btn{width:36px;height:36px;border:none;background:none;color:var(--mt-accent);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;line-height:1}
.qty-btn:active{background:var(--mt-border)}
.qty-num{flex:1;border:none;background:none;text-align:center;font-size:14px;font-weight:500;color:var(--mt-text);outline:none;min-width:0;padding:0}
.custom-name-input{border-color:var(--mt-border2);background:#FBF7F4}
.custom-name-input::placeholder,.ctrl-input::placeholder{color:var(--mt-hint)}
.metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:1px;background:var(--mt-border);border-top:0.5px solid var(--mt-border)}
.metric{background:var(--mt-card);padding:10px 6px;text-align:center}
.metric-label{font-size:9px;color:var(--mt-muted);letter-spacing:0.4px;margin-bottom:4px;text-transform:uppercase}
.metric-val{font-size:13px;font-weight:500}
.note-row{margin-bottom:12px}
.note-input{width:100%;padding:9px 12px;border:0.5px solid var(--mt-border);border-radius:10px;background:var(--mt-card);color:var(--mt-text);font-size:13px;outline:none}
.note-input::placeholder{color:var(--mt-hint)}
.totals-bar{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-bottom:14px}
.tot{background:var(--mt-surface2);border-radius:12px;padding:12px 8px;text-align:center}
.tot-label{font-size:10px;color:var(--mt-muted);letter-spacing:0.4px;margin-bottom:5px;text-transform:uppercase}
.tot-val{font-size:17px;font-weight:500;letter-spacing:-0.3px}
.save-btn{padding:14px;background:var(--mt-accent);color:#FAF6F1;border:none;border-radius:14px;font-size:15px;font-weight:500;cursor:pointer;width:100%}
.save-btn:active{opacity:0.85}
.period-bar{display:flex;gap:2px;background:var(--mt-surface);border-radius:12px;padding:3px;margin-bottom:16px}
.period-btn{flex:1;padding:7px;text-align:center;font-size:13px;font-weight:500;color:var(--mt-muted);border:none;background:none;border-radius:9px;cursor:pointer}
.period-btn.active{background:var(--mt-card);color:var(--mt-text);border:0.5px solid var(--mt-border)}
.stat-cards{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-bottom:16px}
.stat-card{background:var(--mt-surface2);border-radius:14px;padding:14px}
.stat-card-label{font-size:10px;color:var(--mt-muted);letter-spacing:0.4px;margin-bottom:5px;text-transform:uppercase}
.stat-card-val{font-size:22px;font-weight:500;letter-spacing:-0.5px}
.stat-card-sub{font-size:11px;color:var(--mt-muted);margin-top:2px}
.divider{height:0.5px;background:var(--mt-border);margin:4px 0 14px}
.list-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.list-title{font-size:14px;font-weight:500}
.list-count{font-size:12px;color:var(--mt-muted)}
.orders-list{display:flex;flex-direction:column;gap:8px}
.order-row{background:var(--mt-card);border:0.5px solid var(--mt-border);border-radius:12px;padding:12px 14px}
.order-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px}
.order-note-text{font-size:13px;font-weight:500}
.order-level{font-size:11px;color:var(--mt-muted);font-weight:400}
.order-date{font-size:11px;color:var(--mt-hint);margin-top:1px}
.order-items-str{font-size:12px;color:var(--mt-muted);margin-bottom:7px;line-height:1.5}
.order-nums{display:flex;gap:12px;flex-wrap:wrap}
.onum{font-size:12px;font-weight:500}
.del-btn{background:none;border:none;cursor:pointer;color:var(--mt-hint);font-size:12px;padding:3px 8px;border-radius:6px;white-space:nowrap;flex-shrink:0}
.del-btn:active{background:#F5E0DC;color:var(--mt-red)}
.del-period-btn{padding:5px 12px;background:none;border:0.5px solid var(--mt-border2);border-radius:20px;font-size:12px;color:var(--mt-red);cursor:pointer;white-space:nowrap}
.del-period-btn:active{background:#F5E0DC}
.c-blue{color:var(--mt-blue)}.c-green{color:var(--mt-green)}.c-red{color:var(--mt-red)}.c-muted{color:var(--mt-muted)}
.apply-row{background:var(--mt-card);border:0.5px solid var(--mt-border);border-radius:14px;padding:12px 14px;margin-bottom:12px}
.apply-label{font-size:11px;color:var(--mt-muted);letter-spacing:0.3px;text-transform:uppercase;margin-bottom:10px}
.apply-btn-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:6px}
.apply-grid-btn{padding:9px 4px;border:0.5px solid var(--mt-border2);border-radius:10px;background:var(--mt-surface);color:var(--mt-text);font-size:12px;font-weight:500;cursor:pointer;text-align:center;line-height:1.3;transition:background 0.1s}
.apply-grid-btn.active{background:var(--mt-accent);color:#FAF6F1;border-color:var(--mt-accent)}
.apply-grid-btn:active{opacity:0.85}
.apply-grid-sub{font-size:10px;color:var(--mt-muted);margin-top:2px}
.apply-grid-btn.active .apply-grid-sub{color:rgba(255,255,255,0.7)}
.install-banner{background:var(--mt-surface2);border:0.5px solid var(--mt-border2);border-radius:12px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.install-text{font-size:13px}.install-sub{font-size:11px;color:var(--mt-muted);margin-top:2px}
.install-close{background:none;border:none;cursor:pointer;color:var(--mt-muted);font-size:16px;padding:4px}
/* Modal */
.modal-backdrop{display:none;position:fixed;inset:0;background:rgba(44,36,32,0.55);z-index:100;align-items:flex-end}
.modal-backdrop.open{display:flex}
.modal{background:#FAF6F1;border-radius:24px 24px 0 0;padding:20px 20px calc(20px + var(--safe-bottom));width:100%;max-height:88vh;overflow-y:auto}
.modal-handle{width:36px;height:4px;background:var(--mt-border2);border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:17px;font-weight:600;margin-bottom:4px}
.modal-sub{font-size:13px;color:var(--mt-muted);margin-bottom:16px}
.drop-zone{border:1.5px dashed var(--mt-border2);border-radius:14px;padding:24px 20px;text-align:center;cursor:pointer;background:var(--mt-surface);margin-bottom:12px}
.drop-icon{font-size:28px;margin-bottom:6px}
.drop-text{font-size:14px;color:var(--mt-muted)}
.drop-sub{font-size:12px;color:var(--mt-hint);margin-top:4px}
#previewImg{width:100%;max-height:160px;object-fit:contain;border-radius:10px;margin-bottom:12px;display:none}
.ai-loading{display:none;align-items:center;justify-content:center;gap:10px;padding:14px;font-size:13px;color:var(--mt-muted)}
.spin{width:18px;height:18px;border:2px solid var(--mt-border2);border-top-color:var(--mt-accent);border-radius:50%;animation:spin 0.8s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.ai-result{display:none;background:var(--mt-card);border:0.5px solid var(--mt-border);border-radius:12px;padding:12px 14px;margin-bottom:12px}
.ai-result-label{font-size:10px;color:var(--mt-muted);letter-spacing:0.4px;text-transform:uppercase;margin-bottom:8px}
.ai-item-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:0.5px solid var(--mt-border)}
.ai-item-row:last-child{border-bottom:none}
.ai-item-name{font-size:13px}
.ai-item-right{text-align:right}
.ai-item-qty{font-size:14px;font-weight:500;color:var(--mt-accent)}
.ai-item-price{font-size:11px;color:var(--mt-muted)}
.apply-btn{width:100%;padding:13px;background:#4A7C59;color:#fff;border:none;border-radius:14px;font-size:14px;font-weight:500;cursor:pointer;margin-bottom:8px}
.apply-btn:active{opacity:0.85}
.cancel-btn{width:100%;padding:12px;background:var(--mt-surface2);color:var(--mt-muted);border:none;border-radius:14px;font-size:14px;font-weight:500;cursor:pointer}
.ai-error{display:none;background:#FEF0EF;border:0.5px solid #F5C5C2;border-radius:10px;padding:10px 14px;font-size:13px;color:var(--mt-red);margin-bottom:12px;line-height:1.6}
</style>
</head>
<body>

<div class="app-header">
  <div class="app-title">婕樂纖 利潤計算機</div>
  <div class="app-subtitle">纖體保健 · 美肌系列</div>
</div>

<div class="scroll-area" id="scrollArea">
  <div class="install-banner" id="installBanner" style="display:none">
    <div>
      <div class="install-text">加到手機桌面</div>
      <div class="install-sub">iOS：分享 → 加入主畫面 ｜ Android：選單 → 安裝</div>
    </div>
    <button class="install-close" onclick="document.getElementById('installBanner').style.display='none'">✕</button>
  </div>

  <div id="page-calc" class="page active">
    <div class="toolbar">
      <select class="level-select" id="myLevel" onchange="renderItems()">
        <option value="皇家輔導">皇家輔導</option>
        <option value="一級輔導">一級輔導</option>
        <option value="二級輔導">二級輔導</option>
        <option value="三級輔導">三級輔導</option>
        <option value="三級零售">三級零售</option>
        <option value="實習" selected>實習</option>
      </select>
      <div class="btn-group">
        <button class="outline-btn" onclick="addCustom()">＋ 自訂</button>
        <button class="add-btn" onclick="addItem()">＋ 品牌</button>
      </div>
    </div>
    <div class="apply-row" id="applyRow">
      <div class="apply-label">全部套用售價類型</div>
      <div class="apply-btn-grid">
        <button class="apply-grid-btn active" id="applyGridBtn-r0" onclick="applyAllPriceType('r0')">零售價<div class="apply-grid-sub">消費者</div></button>
        <button class="apply-grid-btn" id="applyGridBtn-r1" onclick="applyAllPriceType('r1')">任兩盒<div class="apply-grid-sub">優惠價</div></button>
        <button class="apply-grid-btn" id="applyGridBtn-r2" onclick="applyAllPriceType('r2')">VIP<div class="apply-grid-sub">混品價</div></button>
        <button class="apply-grid-btn" id="applyGridBtn-c_一級輔導" onclick="applyAllPriceType('c_一級輔導')">一級<div class="apply-grid-sub">進貨價</div></button>
        <button class="apply-grid-btn" id="applyGridBtn-c_二級輔導" onclick="applyAllPriceType('c_二級輔導')">二級<div class="apply-grid-sub">進貨價</div></button>
        <button class="apply-grid-btn" id="applyGridBtn-c_三級輔導" onclick="applyAllPriceType('c_三級輔導')">三級輔<div class="apply-grid-sub">進貨價</div></button>
        <button class="apply-grid-btn" id="applyGridBtn-c_三級零售" onclick="applyAllPriceType('c_三級零售')">三級零<div class="apply-grid-sub">進貨價</div></button>
        <button class="apply-grid-btn" id="applyGridBtn-c_實習" onclick="applyAllPriceType('c_實習')">實習<div class="apply-grid-sub">進貨價</div></button>
      </div>
    </div>
    <div class="items-wrap" id="items">
      <div class="empty-state">點上方按鈕新增商品開始計算</div>
    </div>
    <div class="note-row">
      <div class="ctrl-group">
        <span class="ctrl-label">備註（選填，如：客戶名稱）</span>
        <input class="note-input" id="orderNote" type="text" placeholder="例：王小明">
      </div>
    </div>
    <div class="totals-bar">
      <div class="tot"><div class="tot-label">總營收</div><div class="tot-val c-blue" id="tRev">NT$0</div></div>
      <div class="tot"><div class="tot-label">總利潤</div><div class="tot-val" id="tProfit">NT$0</div></div>
      <div class="tot"><div class="tot-label">利潤率</div><div class="tot-val" id="tMargin">—</div></div>
    </div>
    <button class="save-btn" onclick="saveOrder()">儲存訂單</button>
  </div>

  <div id="page-stats" class="page">
    <div class="period-bar">
      <button class="period-btn" onclick="setPeriod('today')">今天</button>
      <button class="period-btn active" onclick="setPeriod('month')">本月</button>
      <button class="period-btn" onclick="setPeriod('pick')">選月份</button>
      <button class="period-btn" onclick="setPeriod('all')">全部</button>
    </div>
    <div id="monthPicker" style="display:none;margin-bottom:12px">
      <select id="monthSelect" onchange="renderStats()" style="width:100%;padding:8px 12px;border:0.5px solid var(--mt-border2);border-radius:10px;background:var(--mt-card);color:var(--mt-text);font-size:14px;font-weight:500;outline:none"></select>
    </div>
    <div class="stat-cards">
      <div class="stat-card"><div class="stat-card-label">訂單數</div><div class="stat-card-val" id="sOrders">0</div><div class="stat-card-sub">筆</div></div>
      <div class="stat-card"><div class="stat-card-label">總營收</div><div class="stat-card-val c-blue" id="sRev">NT$0</div><div class="stat-card-sub">銷售金額</div></div>
      <div class="stat-card"><div class="stat-card-label">總利潤</div><div class="stat-card-val" id="sProfit">NT$0</div><div class="stat-card-sub">淨利潤</div></div>
      <div class="stat-card"><div class="stat-card-label">平均利潤率</div><div class="stat-card-val" id="sMargin">—</div><div class="stat-card-sub">加權平均</div></div>
    </div>
    <div class="divider"></div>
    <div class="list-header">
      <span class="list-title">訂單明細</span>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="list-count" id="orderCount"></span>
        <button class="del-period-btn" id="delPeriodBtn" style="display:none" onclick="deletePeriod()">刪除本期</button>
      </div>
    </div>
    <div class="orders-list" id="ordersList"></div>
  </div>
</div>

<div class="bottom-nav">
  <button class="nav-btn active" id="nav-calc" onclick="switchTab('calc')">
    <div class="nav-icon"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="15" x2="12" y2="15"/></svg></div>
    計算
  </button>
  <button class="nav-btn" id="nav-stats" onclick="switchTab('stats')">
    <div class="nav-icon"><svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div>
    統計
  </button>
</div>


<script>

const ALL=[
  {name:"纖纖飲",s:"纖體保健",costs:{皇家輔導:700,一級輔導:790,二級輔導:880,三級輔導:955,三級零售:990,實習:1160},retail:[1480,1380,1280]},
  {name:"纖飄錠",s:"纖體保健",costs:{皇家輔導:700,一級輔導:790,二級輔導:880,三級輔導:955,三級零售:990,實習:1160},retail:[1480,1380,1280]},
  {name:"爆纖錠",s:"纖體保健",costs:{皇家輔導:430,一級輔導:470,二級輔導:520,三級輔導:560,三級零售:580,實習:660},retail:[880,800,740]},
  {name:"爆纖錠體驗包",s:"纖體保健",costs:{皇家輔導:120,一級輔導:133,二級輔導:146,三級輔導:158,三級零售:164,實習:190},retail:[240,null,null]},

const PRICE_LABELS=["消費者零售價","任兩盒優惠價","混品VIP價"];
const COST_LEVELS=[{k:'一級輔導',l:'一級輔導價'},{k:'二級輔導',l:'二級輔導價'},{k:'三級輔導',l:'三級輔導價'},{k:'三級零售',l:'三級零售價'},{k:'實習',l:'實習價'}];

let items=[],nid=1,curPeriod='month';
let orders=JSON.parse(localStorage.getItem('jerosse-orders')||'[]');
function save(){localStorage.setItem('jerosse-orders',JSON.stringify(orders));}

if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});
const isStandalone=window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone;
if(!isStandalone&&/iPhone|iPad|Android/i.test(navigator.userAgent)) document.getElementById('installBanner').style.display='flex';

function switchTab(t){
  ['calc','stats'].forEach(id=>{
    document.getElementById('page-'+id).classList.toggle('active',id===t);
    document.getElementById('nav-'+id).classList.toggle('active',id===t);
  });
  document.getElementById('scrollArea').scrollTop=0;
  if(t==='stats') renderStats();
}
function setPeriod(p){
  curPeriod=p;
  document.querySelectorAll('.period-btn').forEach((b,i)=>b.classList.toggle('active',['today','month','pick','all'][i]===p));
  const picker=document.getElementById('monthPicker');
  if(p==='pick'){
    picker.style.display='block';
    populateMonthSelect();
  } else {
    picker.style.display='none';
  }
  renderStats();
}

function populateMonthSelect(){
  const sel=document.getElementById('monthSelect');
  const months={};
  orders.forEach(o=>{
    const d=new Date(o.date);
    const key=d.getFullYear()+'-'+(d.getMonth()+1).toString().padStart(2,'0');
    months[key]=true;
  });
  const sorted=Object.keys(months).sort().reverse();
  if(!sorted.length){sel.innerHTML='<option>尚無記錄</option>';return;}
  sel.innerHTML=sorted.map(k=>{
    const [y,m]=k.split('-');
    return`<option value="${k}">${y} 年 ${parseInt(m)} 月</option>`;
  }).join('');
}
function addItem(){items.push({id:nid++,type:'preset',pi:0,pt:'r0',qty:1});renderItems();}
function addCustom(){items.push({id:nid++,type:'custom',name:'',cost:'',price:'',qty:1});renderItems();}
function removeItem(id){items=items.filter(i=>i.id!==id);renderItems();}
function setField(id,f,v){
  const it=items.find(i=>i.id===id);if(!it)return;
  if(f==='qty')it[f]=parseInt(v)||1;
  else if(f==='pi')it[f]=parseInt(v)||0;
  else it[f]=v;
  renderItems();
}
function getLevel(){return document.getElementById('myLevel').value;}
function calcPreset(it){
  const p=ALL[it.pi],lv=getLevel(),cost=p.costs[lv]||0;
  let sp;const pt=String(it.pt||'r0');
  if(pt.startsWith('c_')){sp=p.costs[pt.slice(2)]||0;}
  else{const idx=parseInt(pt.replace('r',''));sp=p.retail[isNaN(idx)?0:idx];if(sp==null)sp=p.retail[0];}
  const rev=sp*it.qty,tc=cost*it.qty,profit=rev-tc;
  return{cost,sp,rev,profit,margin:rev>0?profit/rev*100:0,name:p.name};
}
function calcCustom(it){
  const cost=parseFloat(it.cost)||0,sp=parseFloat(it.price)||0;
  const rev=sp*it.qty,tc=cost*it.qty,profit=rev-tc;
  return{cost,sp,rev,profit,margin:rev>0?profit/rev*100:0,name:it.name||'自訂商品'};
}
function calcItem(it){return it.type==='custom'?calcCustom(it):calcPreset(it);}
function fmt(n){return'NT$'+Math.round(n).toLocaleString();}

function renderItems(){
  const wrap=document.getElementById('items');
  document.getElementById('applyRow').style.display=items.length?'flex':'none';
  if(!items.length){wrap.innerHTML='<div class="empty-state">點上方按鈕新增商品開始計算</div>';updateTotals();return;}
  wrap.innerHTML=items.map(it=>{
    if(it.type==='custom'){
      const r=calcCustom(it),pc=r.profit>=0?'c-green':'c-red',mc=r.margin>=0?'c-green':'c-red';
      return`<div class="card custom-card">
        <div class="card-head"><span class="series-tag custom-tag">自訂商品</span><button class="rm-btn" onclick="removeItem(${it.id})">✕</button></div>
        <div class="card-body">
          <div class="custom-row">
            <div class="ctrl-group"><span class="ctrl-label">名稱</span><input class="custom-name-input" type="text" placeholder="商品名稱" value="${it.name}" oninput="setField(${it.id},'name',this.value)"></div>
            <div class="ctrl-group"><span class="ctrl-label">成本</span><input class="ctrl-input" type="number" min="0" placeholder="0" value="${it.cost}" oninput="setField(${it.id},'cost',this.value)"></div>
            <div class="ctrl-group"><span class="ctrl-label">售價</span><input class="ctrl-input" type="number" min="0" placeholder="0" value="${it.price}" oninput="setField(${it.id},'price',this.value)"></div>
            <div class="ctrl-group"><span class="ctrl-label">數量</span><div class="qty-ctrl"><button class="qty-btn" onclick="setField(${it.id},'qty',${Math.max(1,(it.qty||1)-1)})">−</button><input class="qty-num" type="number" min="1" value="${it.qty}" onchange="setField(${it.id},'qty',this.value)" onfocus="this.select()"><button class="qty-btn" onclick="setField(${it.id},'qty',${(it.qty||1)+1})">+</button></div></div>
          </div>
        </div>
        <div class="metrics">
          <div class="metric"><div class="metric-label">成本</div><div class="metric-val c-muted">${fmt(r.cost)}</div></div>
          <div class="metric"><div class="metric-label">營收</div><div class="metric-val c-blue">${fmt(r.rev)}</div></div>
          <div class="metric"><div class="metric-label">利潤</div><div class="metric-val ${pc}">${fmt(r.profit)}</div></div>
          <div class="metric"><div class="metric-label">利潤率</div><div class="metric-val ${mc}">${r.margin.toFixed(1)}%</div></div>
        </div>
      </div>`;
    }
    const p=ALL[it.pi],r=calcPreset(it),pc=r.profit>=0?'c-green':'c-red',mc=r.margin>=0?'c-green':'c-red';
    const prodOpts=ALL.map((pp,i)=>`<option value="${i}"${i===it.pi?' selected':''}>[${pp.s}] ${pp.name}</option>`).join('');
    const retailOpts=p.retail.map((pr,i)=>{const dis=pr==null?' disabled':'';const txt=pr==null?`${PRICE_LABELS[i]}（無）`:`${PRICE_LABELS[i]} NT$${pr}`;return`<option value="r${i}"${it.pt==='r'+i?' selected':''}${dis}>${txt}</option>`;}).join('');
    const costOpts=COST_LEVELS.map(lv=>`<option value="c_${lv.k}"${it.pt==='c_'+lv.k?' selected':''}>${lv.l} NT$${p.costs[lv.k]||0}</option>`).join('');
    return`<div class="card">
      <div class="card-head"><span class="series-tag">${p.s}</span><button class="rm-btn" onclick="removeItem(${it.id})">✕</button></div>
      <div class="card-body">
        <select class="prod-select" onchange="setField(${it.id},'pi',this.value)">${prodOpts}</select>
        <div class="controls">
          <div class="ctrl-group"><span class="ctrl-label">售價類型</span><select class="ctrl-select" onchange="setField(${it.id},'pt',this.value)">${retailOpts}<option disabled>── 進貨價 ──</option>${costOpts}</select></div>
          <div class="ctrl-group"><span class="ctrl-label">數量</span><div class="qty-ctrl"><button class="qty-btn" onclick="setField(${it.id},'qty',${Math.max(1,(it.qty||1)-1)})">−</button><input class="qty-num" type="number" min="1" value="${it.qty}" onchange="setField(${it.id},'qty',this.value)" onfocus="this.select()"><button class="qty-btn" onclick="setField(${it.id},'qty',${(it.qty||1)+1})">+</button></div></div>
        </div>
      </div>
      <div class="metrics">
        <div class="metric"><div class="metric-label">成本</div><div class="metric-val c-muted">${fmt(r.cost)}</div></div>
        <div class="metric"><div class="metric-label">營收</div><div class="metric-val c-blue">${fmt(r.rev)}</div></div>
        <div class="metric"><div class="metric-label">利潤</div><div class="metric-val ${pc}">${fmt(r.profit)}</div></div>
        <div class="metric"><div class="metric-label">利潤率</div><div class="metric-val ${mc}">${r.margin.toFixed(1)}%</div></div>
      </div>
    </div>`;
  }).join('');
  updateTotals();
}

function updateTotals(){
  let tR=0,tP=0;items.forEach(it=>{const r=calcItem(it);tR+=r.rev;tP+=r.profit;});
  const avg=tR>0?tP/tR*100:null;
  document.getElementById('tRev').textContent=fmt(tR);
  const pe=document.getElementById('tProfit');pe.textContent=fmt(tP);pe.className='tot-val '+(tP>=0?'c-green':'c-red');
  const me=document.getElementById('tMargin');me.textContent=avg!==null?avg.toFixed(1)+'%':'—';me.className='tot-val '+(avg===null?'c-muted':avg>=0?'c-green':'c-red');
}

function saveOrder(){
  if(!items.length){alert('請先新增商品');return;}
  const level=getLevel(),note=document.getElementById('orderNote').value.trim();
  let tR=0,tP=0;
  const orderItems=items.map(it=>{const r=calcItem(it);tR+=r.rev;tP+=r.profit;return{name:r.name,qty:it.qty,rev:r.rev,profit:r.profit,cost:r.cost};});
  const now=new Date();
  orders.unshift({id:Date.now(),date:now.toISOString(),dateStr:now.toLocaleDateString('zh-TW',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}),level,note,items:orderItems,rev:tR,profit:tP,margin:tR>0?tP/tR*100:0});
  save();items=[];document.getElementById('orderNote').value='';renderItems();
  alert('訂單已儲存！');
}

function deleteOrder(id){if(!confirm('確定刪除？'))return;orders=orders.filter(o=>o.id!==id);save();renderStats();}

function deletePeriod(){
  const filtered=filterOrders();
  if(!filtered.length)return;
  const sel=document.getElementById('monthSelect');
  const pickLabel=sel&&sel.options[sel.selectedIndex]?sel.options[sel.selectedIndex].text:'選定月份';
  const labels={today:'今天',month:'本月',pick:pickLabel,all:'全部'};
  if(!confirm(`確定刪除「${labels[curPeriod]}」共 ${filtered.length} 筆訂單？此動作無法復原。`))return;
  const ids=new Set(filtered.map(o=>o.id));
  orders=orders.filter(o=>!ids.has(o.id));
  save();renderStats();
}

function filterOrders(){
  const now=new Date();
  if(curPeriod==='today'){const t=now.toDateString();return orders.filter(o=>new Date(o.date).toDateString()===t);}
  if(curPeriod==='month'){return orders.filter(o=>{const d=new Date(o.date);return d.getFullYear()===now.getFullYear()&&d.getMonth()===now.getMonth();});}
  if(curPeriod==='pick'){
    const sel=document.getElementById('monthSelect');
    if(!sel||!sel.value)return orders;
    const [y,m]=sel.value.split('-').map(Number);
    return orders.filter(o=>{const d=new Date(o.date);return d.getFullYear()===y&&d.getMonth()+1===m;});
  }
  return orders;
}

function renderStats(){
  const filtered=filterOrders();let tR=0,tP=0;filtered.forEach(o=>{tR+=o.rev;tP+=o.profit;});
  const avg=tR>0?tP/tR*100:null;
  document.getElementById('sOrders').textContent=filtered.length;
  document.getElementById('sRev').textContent=fmt(tR);
  const sp=document.getElementById('sProfit');sp.textContent=fmt(tP);sp.className='stat-card-val '+(tP>=0?'c-green':'c-red');
  const sm=document.getElementById('sMargin');sm.textContent=avg!==null?avg.toFixed(1)+'%':'—';sm.className='stat-card-val '+(avg===null?'c-muted':avg>=0?'c-green':'c-red');
  document.getElementById('orderCount').textContent=filtered.length+'筆';
  const delBtn=document.getElementById('delPeriodBtn');
  const sel2=document.getElementById('monthSelect');
  const pickLabel2=sel2&&sel2.options[sel2.selectedIndex]?'刪除 '+sel2.options[sel2.selectedIndex].text:'刪除選定月';
  const labels={today:'刪除今天',month:'刪除本月',pick:pickLabel2,all:'刪除全部'};
  delBtn.style.display=filtered.length?'block':'none';
  delBtn.textContent=labels[curPeriod]||'刪除本期';
  const list=document.getElementById('ordersList');
  if(!filtered.length){list.innerHTML='<div class="empty-state">此期間尚無訂單記錄</div>';return;}
  list.innerHTML=filtered.map(o=>{const pc=o.profit>=0?'c-green':'c-red';return`<div class="order-row"><div class="order-top"><div><div class="order-note-text">${o.note||'未備註'} <span class="order-level">· ${o.level}</span></div><div class="order-date">${o.dateStr}</div></div><button class="del-btn" onclick="deleteOrder(${o.id})">刪除</button></div><div class="order-items-str">${o.items.map(i=>`${i.name} ×${i.qty}`).join('、')}</div><div class="order-nums"><span class="onum c-blue">營收 ${fmt(o.rev)}</span><span class="onum ${pc}">利潤 ${fmt(o.profit)}</span><span class="onum c-muted">${o.margin.toFixed(1)}%</span></div></div>`;}).join('');
}

/* ── AI 掃描 ── */

function applyAllPriceType(pt){
  items.forEach(it=>{if(it.type==='preset')it.pt=pt;});
  document.querySelectorAll('.apply-grid-btn').forEach(b=>b.classList.remove('active'));
  const btn=document.getElementById('applyGridBtn-'+pt);
  if(btn)btn.classList.add('active');
  renderItems();
}

renderItems();
</script>
